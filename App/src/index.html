<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2P2S</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="title-block">
          <h1>2P2S</h1>
          <p class="subtitle">单向视频 · 纯 libzt 双通道（信令 + 视频帧）</p>
        </div>
        <div class="status">
          <span id="status_point" class="status-dot"></span>
          <span id="status_Text">未连接</span>
        </div>
      </header>

      <main>
        <section>
          <h2>连接配置</h2>
          <div class="form-grid">
            <label>
              <span>本机虚拟 IP（ZeroTier）</span>
              <input id="host_ip" type="text" placeholder="加入网络后自动填入" readonly />
            </label>
            <label>
              <span>基础端口（信令）</span>
              <input id="port" type="number" min="1" max="65535" />
            </label>
            <label>
              <span>Network（libzt 网络 ID）</span>
              <input id="network_input" type="text" placeholder="例如 8056c2e21c000001" />
            </label>
            <label>
              <span>角色</span>
              <select id="role_select">
                <option value="share">分享端</option>
                <option value="viewer">观看端</option>
              </select>
            </label>
            <label>
              <span>对方 IP（观看端）</span>
              <input id="peer_ip" type="text" placeholder="例如 10.147.20.8" />
            </label>
            <label>
              <span>码率档位（共享端）</span>
              <select id="quality_select">
                <option value="360p">360p</option>
                <option value="480p">480p</option>
                <option value="720p" selected>720p</option>
                <option value="1080p">1080p</option>
              </select>
            </label>
          </div>

          <div class="actions">
            <button id="connect_btn">建立 libzt 通道</button>
            <button id="start_btn">开始共享/观看</button>
            <button id="open_log_btn">打开日志文件夹</button>
            <button id="stop_btn">断开</button>
          </div>
        </section>

        <section>
          <div class="media merged-media">
            <div class="merged-video-card">
              <div class="merged-video-header">
                <h3>画面</h3>
                <span id="video_source_tag" class="video-source-tag">无信号</span>
              </div>
              <div class="merged-video-stage">
                <video id="local_video" autoplay muted playsinline></video>
                <canvas id="remote_canvas" class="video-hidden"></canvas>
              </div>
              <div id="remote_stats" class="video-stats">Bitrate: - kbps | FPS: -</div>
            </div>
          </div>
          <div>
            <h3>事件日志</h3>
            <div id="log_list" class="log-list"></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
