<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC 屏幕共享</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div>
          <p>Tauri + WebRTC</p>
          <h1>屏幕共享</h1>
          <p class="subtitle">局域网 IP / 虚拟内网环境</p>
        </div>
        <div class="status">
          <span id="status_point" class="status-dot"></span>
          <span id="status_Text">未连接</span>
        </div>
      </header>

      <main>
        <section>
          <h2>连接配置</h2>
          <div class="form-grid">
            <label>
              <span>信令服务器 IP</span>
              <input id="host_ip" type="text" placeholder="例如 10.0.0.5" />
            </label>
            <label>
              <span>端口</span>
              <input id="port" type="number" min="1" max="65535" />
            </label>
            <label>
              <span>Network</span>
              <input id="network_input" type="text" placeholder="network" />
            </label>
            <label>
              <span>角色</span>
              <select id="role_select">
                <option value="share">分享者（发起屏幕）</option>
                <option value="viewer">观看者（接收屏幕）</option>
              </select>
            </label>
            <label>
              <span>对方 IP（观看者）</span>
              <input id="peer_ip" type="text" placeholder="例如 10.0.0.6" />
            </label>
          </div>

          <div class="actions">
            <button id="connect_btn">连接信令</button>
            <button id="start_btn">开始共享/观看</button>
            <button id="quickViewBtn">输入 IP 观看</button>
            <button id="open_log_btn">打开日志文件夹</button>
            <button id="stop_btn">断开</button>
          </div>

          <p>提示：分享者连接后，观看者通过输入 IP 快速加入即可自动发起协商。</p>
        </section>

        <section>
          <div class="media">
            <div>
              <h3>本地预览</h3>
              <video id="local_video" autoplay muted playsinline></video>
            </div>
            <div>
              <h3>远端画面</h3>
              <video id="remote_video" autoplay playsinline></video>
            </div>
          </div>
          <div>
            <h3>事件日志</h3>
            <div id="log_list" class="log-list"></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
